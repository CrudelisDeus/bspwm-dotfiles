#backend = "glx";
backend = "xrender";

# radius
#################################

corner-radius = 10;

# blur
#################################

blur-method = "dual_kawase";
blur-strength = 15;
blur-background = true;

# opacity
#################################

opacity-rule = [
  "80:class_g = 'kitty'",
  "80:class_g = 'Polybar'"
];
