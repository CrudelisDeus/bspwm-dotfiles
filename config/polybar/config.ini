[colors]
background = #000000
background-alt = #373B41
foreground = #C5C8C6
primary = #329DA4
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/main]
wm-restack = bspwm
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

#line-size = 3ptoverride-redirect = false

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = " "
separator-foreground = ${colors.disabled}

#font-0 = monospace;2
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "Font Awesome 6 Free:style=Solid:size=10;2"
font-2 = "Noto Sans:size=10;2"
font-3 = "DejaVu Sans:size=10;2"

#modules-left = xworkspaces xwindow
modules-left = xworkspaces systray

modules-center = cpu memory filesystem battery
modules-right = xkeyboard wlan eth pulseaudio date notifications theme-toggle scripts power

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
# override-redirect = true
override-redirect = false
;
; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 4pt
tray-spacing = 6pt
tray-maxsize = 5

[module/notifications]
type = custom/script
exec = echo "ůįāö"
interval = 0
click-left = dunstctl history-pop

[module/scripts]
type = custom/script
exec = echo "ÔĎ©"
interval = 0
format = <label>
label = %output%
label-foreground = ${colors.primary}
click-left = ~/.config/bspwm/bin/rofi_custom_script.py

[module/theme-toggle]
type = custom/script
exec = ~/.config/bspwm/bin/polybar_current_theme.py
interval = 2
click-left = ~/.config/bspwm/bin/custom_script_change_theme_dark_or_light.py
label = %output%
format = <label>
label-foreground = ${colors.primary}
#format-padding = 1

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M
 
format-charging = <animation-charging><label-charging>
#format-charging-background = ${colors.primary}
label-charging = " %percentage%%"
#label-charging-padding-left = 3pt
#label-charging-padding-right = 7pt 

format-discharging = <ramp-capacity><label-discharging>
#format-discharging-background = ${colors.primary}
label-discharging = " %percentage%%"

format-full = <label-full>
#format-full-background = ${colors.primary}
format-full-prefix = ÔČÄ
format-full-prefix-foreground = ${colors.primary}
label-full = " %percentage%%"

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.primary}
ramp-capacity-font = 2

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-foreground = ${colors.primary}
animation-charging-font = 2
animation-charging-framerate = 700

[module/xworkspaces]
type = internal/xworkspaces

label-active = "ÔĄĎ"
#label-active-background = ${colors.primary}
label-active-foreground = ${colors.primary}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = "ÔĄĎ"
label-occupied-padding = 1

label-urgent = "ÔĄĎ"
#label-urgent-background = ${colors.primary}
label-urgent-padding = 1
label-urgent-foreground = ${colors.primary}

label-empty = "ÔÜí"

#label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

format-mounted = <label-mounted>
format-mounted-prefix = Ôā† 
format-mounted-prefix-foreground = ${colors.primary}

label-mounted = "  %percentage_used%%"

format-unmounted = <label-unmounted>
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ÔÄ®  "
#format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ÔÄ¶ muted
#label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
#label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįėö "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ"
#format-prefix-foreground = ${colors.primary}
format-prefix-foreground = ${colors.primary}
label = " %percentage:2%%"

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
#label-connected = %{F#F0C674}NET%{F-} %essid% %local_ip%
label-connected = Ôáę  ‚Üď%downspeed% ‚ÜĎ%upspeed%
interval = 1

[module/eth]
inherit = network-base
interface-type = wired
#label-connected = %{F#F0C674}NET%{F-} %local_ip%
label-connected = ůįĆó ‚Üď%downspeed% ‚ÜĎ%upspeed%

[module/date]
type = internal/date
interval = 1

date = %I:%M:%S %p
date-alt = %I:%M:%S %p %z %d %a %Y %p

label = %date%
#label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

#[module/power]
#format-prefix-foreground = ${colors.primary}
#type = custom/script
#exec = echo "ÔÄĎ"
#click-left = ~/.config/rofi/powermenu.sh

[module/power]
type = custom/script
exec = echo "ÔÄĎ"
interval = 0
format = <label>
label = %output%
label-foreground = ${colors.primary}
click-left = ~/.config/bspwm/bin/rofi_powermenu.py

; vim:ft=dosini
